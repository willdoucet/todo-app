name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todo_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run unit tests
        working-directory: backend
        env:
          # app/main.py mkdirs UPLOAD_DIR at import time. Default /app/uploads
          # works inside Docker (WORKDIR=/app + volume mount) but fails on the
          # CI runner (root-owned /). Point at a writable tmp path instead.
          UPLOAD_DIR: /tmp/uploads
        run: uv run pytest tests/unit -v

      - name: Run integration tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/todo_app_test
          UPLOAD_DIR: /tmp/uploads
        run: uv run pytest tests/integration -v

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

  visual-tests:
    # No `needs:` — the visual-test stack shares nothing with backend-tests or
    # frontend-tests and runs ~3 min. Parallel scheduling saves wall-time per PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Adversarial review A6: Buildx alone is fine, but a plain directory
        # cache does not give `docker-compose` real layer-cache hits. SC5a's
        # warm-cache SLA only counts after explicit BuildKit caching is wired
        # (cache_from / cache_to) and the hit is visible in CI logs.
        uses: docker/setup-buildx-action@v3

      - name: Verify CI_FERNET_KEY secret is set
        # Pre-landing review fix #8 — fail fast with a clear error instead of
        # letting `api-test` crash-loop on an empty Fernet key. Without this,
        # the symptom is `up --wait` timing out at ~2 min with no clear signal.
        env:
          CI_FERNET_KEY: ${{ secrets.CI_FERNET_KEY }}
        run: |
          if [ -z "$CI_FERNET_KEY" ]; then
            echo "::error::CI_FERNET_KEY repo secret is unset. Generate one with:"
            echo "  python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\""
            echo "and add it at Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Write CI .env for docker-compose
        # The visual-tests job runs the full docker-compose stack, which needs
        # POSTGRES_* and FERNET_KEY or the api container crashes on startup.
        # Values are test-only; real secrets go through deploy workflows.
        working-directory: backend
        run: |
          cat > .env <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=todo_app
          FERNET_KEY=${{ secrets.CI_FERNET_KEY }}
          EOF

      - name: Build and start visual-test stack
        working-directory: backend
        run: |
          docker compose --profile visual-test up -d --wait \
            db redis api-test frontend-preview

      - name: Belt-and-suspenders preview reachability check
        # `up --wait` already honors frontend-preview's healthcheck. Kept as an
        # explicit, human-readable intent and as a guard against healthcheck drift.
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4173 > /dev/null && break
            sleep 2
          done

      - name: Run visual tests
        working-directory: backend
        run: docker compose --profile visual-test run --rm frontend-visual

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/

      - name: Teardown
        if: always()
        working-directory: backend
        run: docker compose --profile visual-test down -v
