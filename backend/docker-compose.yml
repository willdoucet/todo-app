services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"             # Maps to 5433 locally (avoid conflict with local postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: dev
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        if [ ! -d /app/uploads/stock_icons ]; then
          cp -r /app/stock_icons_src /app/uploads/stock_icons
        fi &&
        if [ -n \"$UV_DEV_MODE\" ]; then
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
        else
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000
        fi
      "
    volumes:
      # For hot-reload during development (optional but very useful)
      - ./app:/app/app:ro
      - ./alembic:/app/alembic
      - ./tests:/app/tests:ro
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - TEST_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/todo_app_test
      - PYTHONUNBUFFERED=1
      - UPLOAD_DIR=/app/uploads
      - REDIS_URL=redis://redis:6379/0
      - FERNET_KEY=${FERNET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL_NAME=${AI_MODEL_NAME:-claude-haiku-4-5-20251001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"           # Vite dev server port
    volumes:
      - ../frontend:/app
      - /app/node_modules     # avoid overwriting node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://localhost:8000   # Browser needs localhost, not Docker service name

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      target: dev
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./app:/app/app:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - FERNET_KEY=${FERNET_KEY}
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL_NAME=${AI_MODEL_NAME:-claude-haiku-4-5-20251001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  celery_beat:
    build:
      context: .
      target: dev
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./app:/app/app:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env

  # ── Visual regression test stack (profile: visual-test) ────────────────────
  # These services only start when the `visual-test` profile is active, so a
  # normal `docker-compose up` never touches them:
  #
  #   docker-compose --profile visual-test up -d --wait \
  #     db redis api-test frontend-preview
  #   docker-compose --profile visual-test run --rm frontend-visual
  #
  # api-test points at todo_app_test so seeding doesn't pollute the local dev
  # database. frontend-preview serves the production bundle via `vite preview`
  # (VITE_API_BASE_URL baked to api-test:8000). frontend-visual runs Playwright
  # against the preview. Rebuild frontend-preview + frontend-visual whenever
  # frontend code / config / specs change — no bind-mount (see Adversarial A5).
  api-test:
    build:
      context: .
      target: dev
    profiles: [visual-test]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/todo_app_test
      - PYTHONUNBUFFERED=1
      - UPLOAD_DIR=/app/uploads
      - REDIS_URL=redis://redis:6379/0
      - FERNET_KEY=${FERNET_KEY}
      # Eng review rerun R1 — widens CORS allowlist so the browser loading
      # frontend-preview:4173 can reach api-test:8000. Without this, every
      # API call from the visual-test bundle fails CORS and the suite dies
      # on aaa-smoke.spec.js.
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend-preview:4173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      # `depends_on: service_started` fires when the container starts, not when
      # alembic finishes. Without this healthcheck, frontend-preview can build
      # before migrations complete and seed against a half-migrated schema.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/').read(); sys.exit(0)"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend-preview:
    build:
      context: ../frontend
      target: preview
      args:
        VITE_API_BASE_URL: http://api-test:8000
    profiles: [visual-test]
    ports:
      - "4173:4173"
    depends_on:
      api-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4173/"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend-visual:
    build:
      context: ../frontend
      target: visual-test
    profiles: [visual-test]
    depends_on:
      frontend-preview:
        condition: service_healthy
      api-test:
        condition: service_healthy
    environment:
      - PREVIEW_URL=http://frontend-preview:4173
      - API_URL=http://api-test:8000
      # Adversarial review A5: NO bind mount — specs, fixtures, and frontend
      # app code are baked into the images at build time. Rebuild
      # frontend-preview and frontend-visual whenever the frontend working
      # tree changes or local runs can silently go green against a stale bundle.
    volumes:
      - ../frontend/test-results:/app/test-results
    command: ["npx", "playwright", "test"]

volumes:
  postgres_data:
  uploads_data: